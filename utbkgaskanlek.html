<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FayerX - Sesi Belajar</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #0d0d14; color: #f1f1f1;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        #feed {
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory; 
            scrollbar-width: none;
            scroll-behavior: smooth;
        }
        #feed::-webkit-scrollbar { display: none; }

        /* Top Navigation Overlay */
        .top-nav {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 20px; box-sizing: border-box;
            display: flex; justify-content: space-between;
            z-index: 100; pointer-events: none;
        }
        .btn-home {
            pointer-events: auto;
            color: #aaa; text-decoration: none; font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.1); padding: 8px 15px;
            border-radius: 20px; backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        .btn-home:hover { background: rgba(255, 255, 255, 0.2); color: #fff; }

        .question-card {
            height: 100vh; width: 100vw;
            scroll-snap-align: start;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0d0d14 100%);
        }

        .content-wrapper {
            max-width: 550px; width: 100%;
            display: flex; flex-direction: column;
            z-index: 10;
        }

        .header {
            font-weight: 600; color: #6366f1;
            font-size: 0.9rem; text-transform: uppercase;
            letter-spacing: 2px; margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.3rem; margin-bottom: 30px;
            line-height: 1.6; font-weight: 500;
        }

        .option-btn {
            background-color: rgba(255, 255, 255, 0.05);
            color: white; border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px 20px; margin-bottom: 15px;
            border-radius: 16px; font-size: 1.05rem;
            text-align: left; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            width: 100%; font-family: 'Poppins', sans-serif;
            backdrop-filter: blur(10px);
        }

        .option-btn:hover:not(:disabled) { 
            background-color: rgba(99, 102, 241, 0.2); 
            border-color: #6366f1; transform: translateY(-2px);
        }
        .option-btn:disabled { cursor: default; opacity: 0.9; }

        /* Modern Correct & Wrong states */
        .correct { 
            background-color: rgba(46, 204, 113, 0.2) !important; 
            border-color: #2ecc71 !important; 
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.3);
        }
        .wrong { 
            background-color: rgba(231, 76, 60, 0.2) !important; 
            border-color: #e74c3c !important; 
        }

        .explanation {
            background-color: rgba(255, 255, 255, 0.08);
            padding: 20px; border-radius: 16px; margin-top: 20px;
            border-left: 5px solid #a855f7; font-size: 0.95rem;
            line-height: 1.6; display: none; color: #e2e8f0;
            backdrop-filter: blur(10px);
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card h1 { font-size: 5rem; margin: 10px 0; color: #2ecc71; text-shadow: 0 0 20px rgba(46, 204, 113, 0.4); }
        .result-card p { font-size: 1.2rem; color: #bbb; }

        .reload-btn {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white; border: none; padding: 15px 35px;
            border-radius: 30px; font-weight: 600; font-size: 1.1rem;
            margin-top: 25px; cursor: pointer; transition: 0.3s;
            font-family: 'Poppins', sans-serif;
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3);
        }

        .reload-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(99, 102, 241, 0.5); }

        .swipe-indicator {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); font-size: 0.85rem;
            animation: bounce 2s infinite; color: #888;
            letter-spacing: 1px; text-transform: uppercase;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0) translateX(-50%); }
            40% { transform: translateY(-10px) translateX(-50%); }
            60% { transform: translateY(-5px) translateX(-50%); }
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="index.html" class="btn-home">← Kembali</a>
    </div>

    <div id="feed"></div>

    <script>
        const questions = [
            {
                category: "Pengetahuan Kuantitatif",
                text: "Jika 4 ÷ (1/2) = √t, nilai t sama dengan ...",
                options: ["A. 8", "B. 16", "C. 32", "D. 64", "E. 128"],
                answerIndex: 3, 
                explanation: "Selesaikan operasi pembagian terlebih dahulu: 4 ÷ (1/2) = 4 × 2 = 8. Persamaan menjadi 8 = √t. Untuk menghilangkan akar, kuadratkan kedua ruas: 8² = t, maka t = 64."
            },
            {
                category: "Penalaran Matematika",
                text: "Pertemuan keluarga dihadiri 15 laki-laki dan 10 perempuan. Akan dipilih pengurus dari yang hadir. Banyak cara terpilihnya pengurus dengan sekretaris perempuan adalah...",
                options: ["A. 5.400", "B. 5.520", "C. 5.750", "D. 5.760"],
                answerIndex: 1, 
                explanation: "Total hadirin 25 orang. Posisi sekretaris wajib perempuan (10 pilihan). Sisa kursi (ketua & bendahara) diperebutkan oleh sisa orang (24 orang). Gunakan permutasi: P(24, 2) = 24 × 23 = 552. Total cara = 10 × 552 = 5.520."
            },
            {
                category: "Penalaran Umum",
                text: "Semua mahasiswa jurusan IT pandai coding. Sebagian mahasiswa jurusan IT suka main game. Kesimpulan yang tepat adalah...",
                options: [
                    "A. Semua yang suka game pandai coding.",
                    "B. Sebagian mahasiswa IT tidak pandai coding.",
                    "C. Sebagian mahasiswa yang pandai coding suka main game.",
                    "D. Tidak ada kesimpulan."
                ],
                answerIndex: 2, 
                explanation: "Premis 1 (Semua IT = pandai coding). Premis 2 (Sebagian IT = suka game). Irisan dari keduanya adalah: ada mahasiswa IT yang pandai coding sekaligus suka game. Artinya, sebagian dari mereka yang pandai coding itu suka main game."
            }
        ];

        const feed = document.getElementById('feed');
        let currentScore = 0;

        function renderFeed() {
            feed.innerHTML = ''; 
            currentScore = 0;

            questions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';

                const wrapper = document.createElement('div');
                wrapper.className = 'content-wrapper';

                const header = document.createElement('div');
                header.className = 'header';
                header.innerText = q.category + ` (${index + 1}/${questions.length})`;

                const qText = document.createElement('div');
                qText.className = 'question-text';
                qText.innerText = q.text;

                const expDiv = document.createElement('div');
                expDiv.className = 'explanation';
                expDiv.innerHTML = `<strong>💡 Pembahasan:</strong><br>${q.explanation}`;

                wrapper.appendChild(header);
                wrapper.appendChild(qText);

                q.options.forEach((opt, optIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt;
                    
                    btn.onclick = () => {
                        const buttons = wrapper.querySelectorAll('button');
                        buttons.forEach(b => b.disabled = true);
                        
                        if (optIndex === q.answerIndex) {
                            btn.classList.add('correct');
                            currentScore++;
                        } else {
                            btn.classList.add('wrong');
                            buttons[q.answerIndex].classList.add('correct'); 
                            expDiv.style.display = 'block'; 
                        }
                        document.getElementById('final-score-text').innerText = currentScore;
                    };
                    wrapper.appendChild(btn);
                });

                wrapper.appendChild(expDiv);
                card.appendChild(wrapper);

                if (index === 0) {
                    const indicator = document.createElement('div');
                    indicator.className = 'swipe-indicator';
                    indicator.innerText = "Scroll / Swipe Ke Atas";
                    card.appendChild(indicator);
                }

                feed.appendChild(card);
            });

            const resultCard = document.createElement('div');
            resultCard.className = 'question-card result-card';
            resultCard.innerHTML = `
                <div class="content-wrapper" style="align-items: center; text-align: center;">
                    <h2>🎉 Sesi Selesai! 🎉</h2>
                    <h1 id="final-score-text">0</h1>
                    <p>dari ${questions.length} soal benar</p>
                    <button class="reload-btn" onclick="location.reload()">Ulangi Latihan</button>
                </div>
            `;
            feed.appendChild(resultCard);
        }

        renderFeed();
    </script>
</body>
</html>
